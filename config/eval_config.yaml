model:
  # User-supplied OpenAI-compatible endpoint.
  # Note: https://api.deepseek.com is not a local endpoint; this is a recorded deviation
  # from the original "local model only / no cloud API" baseline requirement.
  base_url: "https://api.deepseek.com"
  model: "deepseek-v4-pro"
  api_key_env: "LLM_API_KEY"
  temperature: 0
  max_tokens: 4096

judge:
  # Judge content semantically with the same OpenAI-compatible endpoint.
  # The API key is read from api_key_env; never write secrets into this file.
  mode: "llm"
  base_url: "https://api.deepseek.com"
  model: "deepseek-v4-pro"
  api_key_env: "LLM_API_KEY"
  temperature: 0
  max_tokens: 4096
  timeout_seconds: 180
  retries: 4
  workers: 4
  final_text_max_chars: 12000
  require_parseable_json: false

paths:
  expense_db: "data/expense.db"
  policy_corpus_dir: "data/corpus"
  ground_truth: "data/ground_truth.yaml"
  evals: "data/evals.json"
  runs_dir: "D:/算法LLM/项目篇/东方证券/agent/blackbox-eval/runs"
  output_dir: "D:/算法LLM/项目篇/东方证券/agent/blackbox-eval/output"

fixtures:
  policy_query_mcp: "D:/算法LLM/项目篇/东方证券/agent/blackbox-eval/fixtures/policy_query_mcp.py"
  expense_query_mcp: "D:/算法LLM/项目篇/东方证券/agent/blackbox-eval/fixtures/expense_query_mcp.py"
  audit_role_prompt: "D:/算法LLM/项目篇/东方证券/agent/blackbox-eval/fixtures/audit_role_prompt.md"
  output_contract: "D:/算法LLM/项目篇/东方证券/agent/blackbox-eval/fixtures/output_contract.md"

execution:
  task_timeout_seconds: 900
  candidate_max_steps:
    qwen-code: 12
    trae-agent: 16
    opencode: 12
    claude-code: 12
    codex: 12
  prompt_variants:
    - precise
  repeats_per_variant: 1
  variance_probe:
    enabled: false
    sample_tasks: 5
    repeats: 3

candidates:
  - name: qwen-code
    enabled: true
  - name: goose
    enabled: false
  - name: trae-agent
    enabled: true
  - name: opencode
    enabled: true
  - name: claude-code
    enabled: true
  - name: codex
    enabled: true

