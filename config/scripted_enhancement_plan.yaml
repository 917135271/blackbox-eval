version: scripted-enhancement-v1.2
status: rubric_v7_replacement_cases_require_canary_and_refreeze

comparison:
  baseline_groups: existing_gate4_baseline_groups
  original_enhanced_groups: existing_gate4_enhanced_groups
  scripted_groups:
    - ccb-scripted-enhanced
    - codex-scripted-enhanced
    - openclaude-scripted-enhanced
    - opencode-scripted-enhanced
    - oh-my-pi-scripted-enhanced
    - pi-agent-scripted-enhanced
  formal_cases_per_group: 15
  additional_formal_runs: 90
  rubric: atomic-binary-checklist-v7

gate3_canary:
  cases: [DEV-001, DEV-002, DEV-003, DEV-007, DEV-009, DEV-012]
  cases_per_group: 6
  run_count: 36
  purpose:
    - policy exception and version handling
    - compact policy QA route
    - focused record audit
    - batch aggregation
    - false-positive reverse check
    - comprehensive audit report
  formal_cases_used_for_tuning: false
  acceptance:
    - all six adapters start with the scripted plugin
    - generated evidence and validation artifacts pass the common validator
    - no format-driven submission failure
    - no simple-task subagent authorization
    - no access to development ground truth

controlled_variables:
  model: deepseek-v4-pro
  timeout_seconds: 900
  dataset: securities-expense-audit-formal-15-v9
  workspace_isolation: true
  business_mcp: unchanged
  final_result_schema: unchanged

script_responsibilities:
  - public-category workflow routing
  - initial and final task-state snapshots
  - stage checkpoint generation
  - evidence-input normalization and exact-set consistency checks
  - JSON normalization and deterministic validation preparation
  - submission preparation and audit events

model_responsibilities:
  - policy and business evidence retrieval
  - policy applicability and exception interpretation
  - audit finding decisions
  - final answer and four semantic result fields
  - finding-to-record, finding-to-policy, and finding-to-fact evidence mapping
  - searched population and query conditions for no-anomaly conclusions

skills_retained:
  - audit-query-planner
  - policy-version-check
  - batch-expense-analysis
  - false-positive-review
  - audit-report

skills_removed_from_model_workflow:
  - evidence-coverage-check
  - result-validator

integrity:
  modifies_existing_baseline_or_enhanced_groups: false
  uses_ground_truth_or_rubric_for_routing: false
  native_context_compaction_claimed: false
