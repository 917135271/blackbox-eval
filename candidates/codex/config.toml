model = "deepseek-v4-pro"
model_provider = "deepseek"
approval_policy = "never"
sandbox_mode = "read-only"
disable_response_storage = true

[features]
shell_tool = false

[model_providers.deepseek]
name = "DeepSeek"
base_url = "https://api.deepseek.com/v1"
env_key = "LLM_API_KEY"
wire_api = "chat"

[mcp_servers.policy_query]
command = "python"
args = ["D:/算法LLM/项目篇/东方证券/agent/blackbox-eval/fixtures/policy_query_mcp.py"]
startup_timeout_sec = 30
tool_timeout_sec = 120

[mcp_servers.policy_query.env]
EVAL_POLICY_CORPUS_DIR = "data/corpus"
PYTHONIOENCODING = "utf-8"

[mcp_servers.expense_query]
command = "python"
args = ["D:/算法LLM/项目篇/东方证券/agent/blackbox-eval/fixtures/expense_query_mcp.py"]
startup_timeout_sec = 30
tool_timeout_sec = 120

[mcp_servers.expense_query.env]
EVAL_EXPENSE_DB = "data/expense.db"
PYTHONIOENCODING = "utf-8"
